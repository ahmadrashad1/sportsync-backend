# Render Blueprint: https://render.com/docs/infrastructure-as-code
# Create a MySQL instance in the Render dashboard (or external DB), then set DB_URL / DB_USERNAME / DB_PASSWORD.
# JDBC example: jdbc:mysql://<host>:3306/<database>?useSSL=true&serverTimezone=UTC

version: "1"

services:
  - type: web
    name: sportsync-backend
    runtime: docker
    branch: master
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/grounds/available
    autoDeploy: true
    envVars:
      # Render sets PORT automatically; Spring Boot reads it via server.port=${PORT:8080}
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: NEWS_API_KEY
        sync: false
