spring.application.name=SportSync

# Render (and other PaaS) inject PORT; local dev defaults to 8080
server.port=${PORT:8080}

# CORS: origins allowed to call this API from the browser (comma-separated).
# Include your Vercel URL(s) and any tunnel URL (ngrok, etc.). Use * for Vercel previews: https://*.vercel.app
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,https://*.vercel.app}


spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/SportSyncDataB2}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:ahmad321}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# SQL Data Initialization is handled via DataInitializationConfig.java (CommandLineRunner)
# This ensures schema is created before data insertion

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true



logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

newsapi.key=${NEWS_API_KEY:d4532b0aa6ab44dc94fc05ce22bb9beb}




